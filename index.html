<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simulador Financeiro</h1>
    <p>Roadmap: Do Zero ao Dux</p>

    <div>
        <label for="monthlyContribution">Aporte Mensal (R$):</label>
        <input type="number" id="monthlyContribution" placeholder="Ex: 800">
    </div>
    <br>
    <div>
        <label for="interestRate">Taxa de Juros Mensal (%):</label>
        <input type="number" id="interestRate" placeholder="Ex: 1">
        <button id="selicBtn" style="margin-top: 10px; font-size: 12px; padding: 8px; border-radius: 5px; cursor: pointer;">Puxar selic atual</button>
    </div>
    <br>
    <div>
        <label for="months">Tempo (Meses):</label>
        <input type="number" id="months" placeholder="Ex: 12">
    </div>
    <br>

    <button id="calculateBtn">Simular</button>
    <button id="clearBtn">Limpar</button>
    <br>
    
    <h3>Comparativo de Rendimento:</h3>

    <div class="results-container" style="display: flex; gap: 15px; justify-content: space-between; text-align: center;">

        <div style="flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 8px;">
            <h4 style="margin-bottom: 5px;">Sua Simulação</h4>
            <p style="font-size: 12px; color: #555;">Taxa Informada</p>
            <h2 id="resultManual" style="color: #2c3e50;">R$0,00</h2>
        </div>

        <div style="flex: 1; padding: 15px; border: 2px solid #27ae60; border-radius: 8px; background-color: #f9fff9;">
            <h4 style="margin-bottom: 5px; color: #27ae60;">Tesouro Selic</h4>
            <p style="font-size: 12px; color: #555;">Rendimento Real</p>
            <h2 id="resultSelic" style="color: #27ae60;">R$0,00</h2>
        </div>

        <div style="flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 8px; opacity: 0.8;">
            <h4 style="margin-bottom: 5px;">Poupança</h4>
            <p style="font-size:  12px; color: #555;">0,5% ao mês</p>
            <h2 id="resultSavings" style="color: #c0392b;">R$0,00</h2>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
