<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simulador Financeiro</h1>
    <p>Roadmap: Do Zero ao Dux</p>

    <div>
        <label for="monthlyContribution">Aporte Mensal (R$):</label>
        <input type="number" id="monthlyContribution" placeholder="Ex: 800">
    </div>
    <br>
    <div>
        <label for="interestRate">Taxa de Juros Mensal (%):</label>
        <input type="number" id="interestRate" placeholder="Ex: 1">
        <button id="selicBtn" style="margin-top: 10px; font-size: 12px; padding: 8px; border-radius: 5px; cursor: pointer;">Puxar selic atual</button>
    </div>
    <br>
    <div>
        <label for="months">Tempo (Meses):</label>
        <input type="number" id="months" placeholder="Ex: 12">
    </div>
    <br>

    <button id="calculateBtn">Simular</button>
    <button id="clearBtn">Limpar</button>
    <br>
    
    <h3>Comparativo de Rendimento:</h3>

    <div class="results-container">

        <div class="card card-manual">
            <h4>Sua Simulação</h4>
            <p>Taxa Informada</p>
            <h2 id="resultManual">R$0,00</h2>
        </div>

        <div class="card card-selic">
            <h4>Tesouro Selic</h4>
            <p>Rendimento Real</p>
            <h2 id="resultSelic">R$0,00</h2>
        </div>

        <div class="card card-savings">
            <h4>Poupança</h4>
            <p>0,5% ao mês</p>
            <h2 id="resultSavings">R$0,00</h2>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
